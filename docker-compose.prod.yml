# Prod compose: nginx serving the built SPA.
# Bring up with: docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: skyops-web-prod
    ports:
      - '${WEB_PORT:-8080}:80'
    restart: unless-stopped
